name: CodeQL Security Scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Runs at 02:00 UTC every Monday — catches new CVEs in unchanged code
    - cron: '0 2 * * 1'

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read

    strategy:
      fail-fast: false
      matrix:
        language: [javascript-typescript, csharp]

    steps:
      - uses: actions/checkout@v6

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}

      - name: Set up .NET (for C# analysis)
        if: matrix.language == 'csharp'
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.x

      - name: Build .NET project (required for C# CodeQL)
        if: matrix.language == 'csharp'
        run: dotnet build server/Pixera.Api/Pixera.Api.csproj -c Release

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
